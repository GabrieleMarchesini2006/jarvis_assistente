name: Briefing mattutino

# Ogni mattina: eventi del giorno + task in scadenza + notizie AI/produttività.
# 06:00 UTC = 08:00 in Italia (ora legale) / 07:00 (ora solare).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install google-genai requests python-dotenv google-api-python-client google-auth notion-client tzdata
      - name: Ricostruisci token.json Google
        run: printf '%s' "$GOOGLE_TOKEN_JSON" > token.json
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      - name: Invia il briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_USER_ID: ${{ secrets.ALLOWED_USER_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          TIMEZONE: Europe/Rome
        run: python daily_briefing.py
