name: Notizie mattutine AI

# Invia il digest di notizie su Telegram ogni mattina.
# L'orario è in UTC: 06:00 UTC = 08:00 in Italia (ora legale) / 07:00 (ora solare).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:  # permette di lanciarlo a mano dalla tab Actions (tasto "Run workflow")

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install google-genai requests python-dotenv

      - name: Invia il digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_USER_ID: ${{ secrets.ALLOWED_USER_ID }}
        run: python daily_news.py
