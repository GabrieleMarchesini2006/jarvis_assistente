name: Promemoria eventi

# Ogni 15 minuti: avvisa se un evento del calendario inizia tra 15-30 minuti.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install google-genai requests python-dotenv google-api-python-client google-auth notion-client tzdata
      - name: Ricostruisci token.json Google
        run: printf '%s' "$GOOGLE_TOKEN_JSON" > token.json
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      - name: Controlla eventi imminenti
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_USER_ID: ${{ secrets.ALLOWED_USER_ID }}
          TIMEZONE: Europe/Rome
        run: python reminders_check.py
